<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emojis - 쉽고 빠른 이모지 검색 및 복사</title>
    <meta name="description" content="인스타그램, 트위터, 블로그에 사용할 예쁜 이모지를 쉽고 빠르게 검색하고 복사하세요. 모든 플랫폼과 호환됩니다.">
    <meta name="keywords" content="이모지, 이모티콘, 복사, 검색, emoji, 인스타 이모지, 특수문자">
    <meta name="author" content="hounga13">

    <!-- Open Graph for Social Sharing -->
    <meta property="og:title" content="Emojis">
    <meta property="og:description" content="원하는 이모지를 1초 만에 검색하고 복사하세요!">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://hounga13.github.io/emojis">

    <!-- Google AdSense Placeholder -->
    <!-- <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script> -->

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="header">
        <div class="header-content">
            <div class="header-top">
                <a href="./" class="logo-link" id="logoLink">
                    <h1 class="logo" id="siteTitle">✨ Emojis</h1>
                </a>
                <div class="lang-selector">
                    <button id="langBtn" class="lang-btn" aria-label="Language">🌐</button>
                    <div id="langDropdown" class="lang-dropdown hidden">
                        <!-- 동적으로 생성됨 -->
                    </div>
                </div>
            </div>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="이모지 검색 (예: 웃음, 사과, 강아지...)" autocomplete="off">
                <button aria-label="검색 지우기" id="clearSearch">&times;</button>
            </div>
            <p class="usage-hint" id="usageHint">🔍 검색하고 👆 클릭하면 바로 복사!</p>
        </div>
    </header>

    <main class="main-content">
        <!-- Ad Banner Placeholder (상단) -->
        <div class="ad-placeholder top-ad">
            <p>Google AdSense Banner (Top)</p>
        </div>

        <nav class="category-nav">
            <ul id="categoryList">
                <li class="active" data-category="all">전체</li>
                <li data-category="recent">최근 사용 🕒</li>
                <li data-category="smileys">스마일리/사람 😀</li>
                <li data-category="animals">동물/자연 🐶</li>
                <li data-category="food">음식/음료 🍔</li>
                <li data-category="activities">활동 ⚽️</li>
                <li data-category="travel">여행/장소 ✈️</li>
                <li data-category="objects">사물 💡</li>
                <li data-category="symbols">기호 ❤️</li>
                <li data-category="flags">깃발 🏳️</li>
            </ul>
        </nav>

        <section id="emojiContainer" class="emoji-container">
            <!-- 렌더링된 이모지들이 여기에 들어갑니다 -->
        </section>

        <!-- Ad Banner Placeholder (하단) -->
        <div class="ad-placeholder bottom-ad">
            <p>Google AdSense Banner (Bottom)</p>
        </div>
    </main>

    <div id="toast" class="toast hidden">✅ 복사되었습니다!</div>

    <footer class="footer">
        <p id="footerText">&copy; 2026 Emojis. All rights reserved.</p>
        <p>Contact: hounga13.github.io</p>
    </footer>

    <script src="i18n.js"></script>
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>

</html>
